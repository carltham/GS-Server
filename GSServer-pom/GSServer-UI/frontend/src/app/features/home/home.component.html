<section class="card" style="margin-top: 16px;">
  <h2>Home</h2>
  <p>Phase 1 top-down UI test target is ready.</p>
  <button
    type="button"
    aria-label="run hardening"
    (click)="runHardening()"
    [disabled]="isSubmitting"
  >
    {{ isSubmitting ? 'Running Hardening...' : 'Run Hardening' }}
  </button>
  <p role="status" aria-live="polite" style="margin-top: 12px;">{{ statusMessage }}</p>
</section>
